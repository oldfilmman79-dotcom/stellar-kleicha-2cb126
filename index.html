<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>매물 노트 — 삼촌은 공인중개사</title>
<meta name="theme-color" content="#0f0f13">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="매물노트">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
<link rel="icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
  :root {
    --bg:#0f0f13; --surface:#1a1a22; --surface2:#22222e; --border:#2e2e3e;
    --accent:#e8c840; --accent2:#40c8a0; --danger:#e85050; --info:#5088e8; --purple:#a078e8;
    --text:#f0f0f5; --text2:#9090a8; --text3:#5a5a72;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px 16px 90px;}

  /* HEADER */
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border);}
  .header-title{font-size:19px;font-weight:900;letter-spacing:-0.5px;}
  .header-title span{color:var(--accent);}
  .header-brand{font-size:13px;font-weight:800;margin-top:4px;background:linear-gradient(90deg,#e8c840,#40c8a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .header-stats{display:flex;gap:10px;}
  .stat-box{text-align:center;cursor:pointer;padding:4px 8px;border-radius:8px;transition:all 0.15s;}
  .stat-box:hover,.stat-box.active{background:var(--surface2);}
  .stat-num{font-size:20px;font-weight:700;}
  .stat-label{font-size:10px;color:var(--text2);margin-top:1px;}
  .col-분양{color:var(--accent);}
  .col-중개{color:var(--info);}

  /* SUMMARY */
  .summary-bar{display:none;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:12px;}
  .summary-bar.open{display:block;}
  .summary-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;}
  .summary-item:last-child{border-bottom:none;}
  .summary-name{font-size:13px;font-weight:700;}
  .summary-sub{font-size:11px;color:var(--text2);margin-top:2px;}
  .summary-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:12px;}

  /* API SECTION - COLLAPSIBLE */
  .api-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:12px;}
  .api-toggle-head{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
  .api-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;}
  .api-row{display:flex;gap:8px;margin-top:6px;}
  .api-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;}
  .api-input:focus{border-color:var(--accent);}
  .api-save-btn{padding:8px 13px;background:var(--accent);border:none;border-radius:8px;color:#0f0f13;font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap;}
  .api-status{font-size:11px;margin-top:5px;}
  .api-status.ok{color:var(--accent2);}
  .api-status.no{color:var(--text3);}

  /* CAT TABS */
  .cat-tabs{display:flex;gap:6px;margin-bottom:8px;}
  .cat-tab{padding:8px 18px;border-radius:22px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
  .cat-tab.active-분양{background:var(--accent);color:#0f0f13;border-color:var(--accent);}
  .cat-tab.active-중개{background:var(--info);color:#fff;border-color:var(--info);}
  .sub-tabs{display:none;gap:6px;margin-bottom:12px;}
  .sub-tabs.show{display:flex;}
  .sub-tab{padding:6px 14px;border-radius:18px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
  .sub-tab.active-매매{background:var(--info);color:#fff;border-color:var(--info);}
  .sub-tab.active-전세{background:var(--accent2);color:#0f0f13;border-color:var(--accent2);}
  .sub-tab.active-월세{background:var(--purple);color:#fff;border-color:var(--purple);}

  /* SCAN ZONE */
  .scan-zone{border:2px dashed var(--border);border-radius:16px;padding:18px;text-align:center;margin-bottom:10px;}
  .scan-zone:hover{border-color:var(--accent);}
  .scan-icon{font-size:28px;margin-bottom:6px;}
  .scan-title{font-size:14px;font-weight:700;margin-bottom:3px;}
  .scan-sub{font-size:11px;color:var(--text2);margin-bottom:13px;}
  .scan-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
  .scan-btn{padding:8px 16px;border-radius:22px;border:1px solid var(--accent);background:rgba(232,200,64,0.1);color:var(--accent);font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
  .scan-btn.registry{border-color:var(--info);background:rgba(80,136,232,0.1);color:var(--info);}
  .scan-input{display:none;}

  /* LOADING */
  .loading-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:300;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
  .loading-overlay.show{display:flex;}
  .loading-spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-img-preview{width:120px;height:120px;object-fit:cover;border-radius:14px;border:2px solid var(--accent);}
  .loading-text{font-size:14px;color:var(--text);font-weight:600;}
  .loading-sub{font-size:12px;color:var(--text3);}

  .manual-btn{width:100%;padding:10px;background:transparent;border:1px solid var(--border);border-radius:12px;color:var(--text2);font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-bottom:10px;}
  .manual-btn:hover{border-color:var(--accent);color:var(--accent);}

  /* IMPORT/EXPORT */
  .ie-row{display:flex;gap:8px;margin-bottom:12px;}
  .ie-btn{flex:1;padding:10px;background:transparent;border-radius:12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;font-weight:600;text-align:center;}
  .ie-btn.export{border:1px solid rgba(64,200,160,0.4);color:var(--accent2);}
  .ie-btn.import{border:1px solid rgba(80,136,232,0.4);color:var(--info);}

  /* REGION FILTER */
  .region-filter{margin-bottom:10px;display:flex;flex-direction:column;gap:6px;}
  .region-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;}
  .region-row::-webkit-scrollbar{display:none;}
  .region-chip{padding:6px 14px;border-radius:18px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all 0.15s;}
  .region-chip.active{background:var(--surface2);color:var(--text);border-color:var(--text3);font-weight:700;}
  .region-chip.city-active{background:var(--info);color:#fff;border-color:var(--info);}
  .region-chip.dong-active{background:rgba(80,136,232,0.15);color:var(--info);border-color:rgba(80,136,232,0.4);}

  /* STATUS TABS */
  .status-tabs{display:flex;gap:6px;margin-bottom:14px;}
  .stab{padding:6px 14px;border-radius:18px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
  .stab.active{background:var(--surface2);color:var(--text);border-color:var(--text3);font-weight:700;}

  /* PROJECT CARD */
  .projects{display:flex;flex-direction:column;gap:10px;}
  .proj-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:14px 16px;cursor:pointer;animation:fadeIn 0.3s ease;}
  .proj-card:hover{border-color:var(--accent);background:rgba(232,200,64,0.03);}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .proj-card-top{display:flex;align-items:flex-start;justify-content:space-between;}
  .proj-card-name{font-size:16px;font-weight:900;letter-spacing:-0.3px;}
  .proj-card-addr{font-size:12px;color:var(--text2);margin-top:4px;}
  .proj-card-meta{display:flex;gap:8px;margin-top:10px;align-items:center;}
  .proj-card-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;}
  .proj-card-date{font-size:10px;color:var(--text3);margin-left:auto;}
  .proj-card-arrow{font-size:16px;color:var(--text3);flex-shrink:0;margin-left:8px;margin-top:2px;}

  .empty{text-align:center;padding:50px 20px;color:var(--text3);font-size:13px;}

  /* DETAIL OVERLAY */
  .detail-overlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;animation:slideInUp 0.25s ease;}
  .detail-overlay.open{display:block;}
  @keyframes slideInUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .detail-topbar{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:10px;z-index:10;}
  .detail-back{background:var(--surface2);border:1px solid var(--border);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;}
  .detail-topbar-name{font-size:16px;font-weight:900;flex:1;}
  .detail-topbar-actions{display:flex;gap:6px;}
  .detail-topbar-btn{padding:6px 12px;border-radius:18px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:11px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap;}
  .detail-topbar-btn.map{color:var(--info);border-color:rgba(80,136,232,0.3);}
  .detail-topbar-btn.del{color:var(--danger);border-color:rgba(232,80,80,0.3);}
  .detail-content{padding:16px;}

  .detail-info-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px;}
  .detail-info-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .detail-info-row:last-child{margin-bottom:0;}
  .detail-info-label{font-size:11px;color:var(--text3);width:40px;flex-shrink:0;}
  .detail-info-value{font-size:14px;font-weight:600;flex:1;word-break:break-all;}
  .detail-info-edit{font-size:11px;color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);}
  .detail-info-edit:hover{color:var(--accent);border-color:var(--accent);}

  .detail-photo-btns{display:flex;gap:8px;margin-bottom:14px;}
  .detail-photo-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-align:center;}
  .detail-photo-btn:hover{border-color:var(--accent);color:var(--accent);}

  .detail-section-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}

  /* TYPE GROUP */
  .type-group{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;}
  .type-group-header{padding:12px 14px;display:flex;align-items:flex-start;justify-content:space-between;}
  .type-group-title{font-size:13px;font-weight:700;}
  .type-group-sub{font-size:11px;color:var(--text2);margin-top:3px;}
  .type-group-right{text-align:right;flex-shrink:0;margin-left:10px;}
  .type-group-price{font-size:15px;font-weight:900;}
  .type-group-loan{font-size:11px;color:var(--text2);margin-top:2px;}
  .type-group-divider{height:1px;background:var(--border);margin:0 14px;}
  .type-group-units{padding:10px 14px;}
  .type-group-units-label{font-size:10px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.4px;}
  .unit-chips{display:flex;flex-wrap:wrap;gap:6px;}
  .unit-chip{padding:4px 10px;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);}
  .unit-chip.done{background:rgba(232,80,80,0.1);color:var(--danger);border-color:rgba(232,80,80,0.3);text-decoration:line-through;}
  .unit-chip:not(.done):hover{background:rgba(64,200,160,0.1);color:var(--accent2);border-color:rgba(64,200,160,0.3);}

  .reg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
  .reg-item{background:var(--surface);border-radius:8px;padding:9px 11px;}
  .reg-label{font-size:10px;color:var(--text3);margin-bottom:3px;}
  .reg-value{font-size:13px;font-weight:600;}

  /* UNIT POPUP */
  .unit-popup{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:400;align-items:flex-end;justify-content:center;}
  .unit-popup.open{display:flex;}
  .unit-popup-box{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 18px 36px;width:100%;max-width:480px;border:1px solid var(--border);border-bottom:none;animation:slideUp 0.2s ease;}
  @keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .unit-popup-name{font-size:18px;font-weight:900;margin-bottom:4px;}
  .unit-popup-sub{font-size:12px;color:var(--text2);margin-bottom:18px;}
  .unit-popup-btns{display:flex;flex-direction:column;gap:8px;}
  .unit-popup-btn{padding:13px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-align:center;}
  .unit-popup-btn.complete{background:rgba(64,200,160,0.15);color:var(--accent2);border-color:rgba(64,200,160,0.3);font-weight:700;}
  .unit-popup-btn.reopen{background:rgba(232,200,64,0.15);color:var(--accent);border-color:rgba(232,200,64,0.3);font-weight:700;}
  .unit-popup-btn.edit{color:var(--accent);}
  .unit-popup-btn.cancel{color:var(--text3);}

  /* PHOTO MODAL WITH ZOOM */
  .photo-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:500;flex-direction:column;align-items:center;justify-content:center;padding:12px;}
  .photo-overlay.open{display:flex;}
  .photo-title{font-size:13px;color:var(--text2);margin-bottom:10px;}
  .photo-scroll{width:100%;max-height:78vh;overflow:auto;-webkit-overflow-scrolling:touch;border-radius:10px;display:flex;align-items:center;justify-content:center;}
  .photo-img{max-width:100%;height:auto;border-radius:10px;display:block;cursor:zoom-in;transition:transform 0.15s;}
  .photo-img.zoomed{max-width:none;width:200%;cursor:zoom-out;}
  .photo-close{margin-top:12px;padding:10px 28px;background:var(--surface);border:1px solid var(--border);border-radius:22px;color:var(--text2);font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
  .photo-hint{font-size:11px;color:var(--text3);margin-top:6px;text-align:center;}

  /* FORM MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:250;align-items:flex-end;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border-radius:24px 24px 0 0;padding:22px 18px 40px;width:100%;max-width:480px;border:1px solid var(--border);border-bottom:none;animation:slideUp 0.25s ease;max-height:92vh;overflow-y:auto;}
  .modal-title{font-size:16px;font-weight:700;margin-bottom:16px;}
  .modal-title span{color:var(--accent);}
  .form-group{margin-bottom:11px;}
  .form-label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.4px;}
  .form-input,.form-select,.form-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;}
  .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
  .form-textarea{resize:none;height:58px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .form-section-title{font-size:11px;color:var(--accent2);text-transform:uppercase;letter-spacing:0.5px;margin:14px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
  .modal-btns{display:flex;gap:8px;margin-top:16px;}
  .btn-cancel{flex:1;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;}
  .btn-save{flex:2;padding:12px;background:var(--accent);border:none;border-radius:10px;color:#0f0f13;font-weight:700;font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;}

  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);padding:11px 22px;border-radius:28px;font-size:13px;font-weight:700;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;white-space:nowrap;}
  .toast.success{background:var(--accent2);color:#0f0f13;}
  .toast.error{background:var(--danger);color:#fff;}
  .toast.show{opacity:1;}

  /* BOTTOM NAV */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;max-width:480px;margin:0 auto;}
  .nav-btn{flex:1;padding:12px 0 16px;background:transparent;border:none;color:var(--text3);font-size:10px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;}
  .nav-btn .nav-icon{font-size:22px;}
  .nav-btn.active{color:var(--accent);}

  /* MAP VIEW */
  .map-view{display:none;padding:0;}
  .map-view.show{display:block;}
  .main-view{display:block;}
  .main-view.hidden{display:none;}
  .map-cat-btn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap;flex-shrink:0;}
  .map-cat-btn.active-all{background:var(--surface2);color:var(--text);border-color:var(--text3);}
  .map-cat-btn.active-분양{background:var(--accent);color:#0f0f13;border-color:var(--accent);}
  .map-cat-btn.active-매매{background:var(--info);color:#fff;border-color:var(--info);}
  .map-cat-btn.active-전세{background:var(--accent2);color:#0f0f13;border-color:var(--accent2);}
  .map-cat-btn.active-월세{background:var(--purple);color:#fff;border-color:var(--purple);}
  #kakaoMap{width:100%;height:calc(100vh - 180px);}
  .map-popup{position:fixed;bottom:80px;left:16px;right:16px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 16px;z-index:101;display:none;max-width:448px;margin:0 auto;}
  .map-popup.show{display:block;}
  .map-popup-name{font-size:15px;font-weight:900;margin-bottom:4px;}
  .map-popup-addr{font-size:12px;color:var(--text2);margin-bottom:10px;}
  .map-popup-btns{display:flex;gap:8px;}
  .map-popup-btn{flex:1;padding:9px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-align:center;}
  .map-popup-btn.primary{background:var(--accent);border-color:var(--accent);color:#0f0f13;font-weight:700;}
</style>
</head>
<body>

<div class="main-view" id="mainView">

<div class="header">
  <div>
    <div class="header-title">📸 <span>매물</span> 노트</div>
    <div class="header-brand">🏢 삼촌은 공인중개사</div>
  </div>
  <div class="header-stats">
    <div class="stat-box" id="statBox분양" onclick="toggleSummary('분양')">
      <div class="stat-num col-분양" id="cnt분양">0</div>
      <div class="stat-label">분양</div>
    </div>
    <div class="stat-box" id="statBox중개" onclick="toggleSummary('중개')">

<script>

// ── API KEY ──────────────────────────────
function toggleApiSection() {

function updateApiStatus() {

  if (key) {
    el.textContent = '✓ 등록됨 — 사진 찍으면 현장 자동 등록!';
    el.className = 'api-status ok';
    document.getElementById('apiKeyInput').value = key.slice(0,14) + '...';

}

function saveKakaoKey() {
  const key = document.getElementById('kakaoKeyInput').value.trim();
  if (!key) return;
  localStorage.setItem('kakaoKey', key);
  document.getElementById('kakaoStatus').textContent = '✓ 카카오맵 Key 등록됨';
  document.getElementById('kakaoStatus').className = 'api-status ok';
  document.getElementById('kakaoKeyInput').value = key.slice(0,8) + '...';

  const old = document.getElementById('kakaoMapSdk');
  if (old) old.remove();
  window.kakao = undefined;

  const s = document.createElement('script');
  s.id = 'kakaoMapSdk';
  s.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${key}&libraries=services&autoload=false`;
  s.onload = () => window.kakao.maps.load(() => showToast('카카오맵 준비됨 ✓', 'success'));
  document.head.appendChild(s);
  showToast('카카오맵 Key 저장됨 ✓', 'success');
}

// ── CATEGORY ─────────────────────────────
function setCat(cat, el) {
  currentCat = cat; currentCity = 'all'; currentDong = 'all';
  document.querySelectorAll('.cat-tab').forEach(t => t.className = 'cat-tab');
  el.classList.add('active-' + cat);
  const sub = document.getElementById('subTabs');
  if (cat === '중개') {
    sub.classList.add('show');
    document.getElementById('registryBtn').style.display = '';
    document.getElementById('pdfBtn').style.display = '';
  } else {
    sub.classList.remove('show');
    document.getElementById('registryBtn').style.display = 'none';
    document.getElementById('pdfBtn').style.display = 'none';
  }
  render();
}
function setSub(sub, el) {
  currentSub = sub; currentCity = 'all'; currentDong = 'all';
  document.querySelectorAll('.sub-tab').forEach(t => t.className = 'sub-tab');
  el.classList.add('active-' + sub);
  render();
}
function getEffectiveCat() { return currentCat === '분양' ? '분양' : currentSub; }

// ── SUMMARY ───────────────────────────────
function toggleSummary(cat) {
  const bar = document.getElementById('summaryBar');
  const colMap = { 분양:'var(--accent)', 매매:'var(--info)', 전세:'var(--accent2)', 월세:'var(--purple)' };
  const bgMap = { 분양:'rgba(232,200,64,0.15)', 매매:'rgba(80,136,232,0.15)', 전세:'rgba(64,200,160,0.15)', 월세:'rgba(160,120,232,0.15)' };

  if (activeSummaryCat === cat && bar.classList.contains('open')) {
    bar.classList.remove('open'); activeSummaryCat = null;
    document.querySelectorAll('.stat-box').forEach(b => b.classList.remove('active')); return;
  }
  activeSummaryCat = cat;
  document.querySelectorAll('.stat-box').forEach(b => b.classList.remove('active'));
  document.getElementById('statBox' + cat).classList.add('active');

  const list = cat === '중개' ? projects.filter(p => ['매매','전세','월세'].includes(p.cat)) : projects.filter(p => p.cat === cat);
  if (!list.length) {
    bar.innerHTML = `<div style="text-align:center;padding:10px;font-size:13px;color:var(--text3)">${cat} 현장이 없습니다</div>`;
    bar.classList.add('open'); return;
  }

  bar.innerHTML = list.map(proj => {
    const remain = proj.units.filter(u=>u.status==='진행').length;
    const done = proj.units.filter(u=>u.status==='완료').length;
    const c = proj.cat;
    return `<div class="summary-item" onclick="jumpToProject('${proj.id}','${c}')">
      <div>
        <div class="summary-name">${proj.projectName} <span style="font-size:10px;color:${colMap[c]};background:${bgMap[c]};padding:1px 6px;border-radius:8px">${c}</span></div>
        <div class="summary-sub">📍 ${proj.location || '-'}</div>
      </div>
      <div style="display:flex;gap:5px;flex-shrink:0;margin-left:8px">
        <span class="summary-badge" style="background:${bgMap[c]};color:${colMap[c]}">${remain}진행</span>
        ${done ? `<span class="summary-badge" style="background:rgba(232,80,80,0.15);color:var(--danger)">${done}완료</span>` : ''}
      </div>
    </div>`;
  }).join('');
  bar.classList.add('open');
}

function jumpToProject(projId, cat) {
  if (cat === '분양') {
    currentCat = '분양';
    document.querySelectorAll('.cat-tab').forEach(t => { t.className='cat-tab'; if(t.dataset.cat==='분양') t.classList.add('active-분양'); });
    document.getElementById('subTabs').classList.remove('show');
  } else {
    currentCat = '중개'; currentSub = cat;
    document.querySelectorAll('.cat-tab').forEach(t => { t.className='cat-tab'; if(t.dataset.cat==='중개') t.classList.add('active-중개'); });
    document.getElementById('subTabs').classList.add('show');
    document.querySelectorAll('.sub-tab').forEach(t => { t.className='sub-tab'; if(t.dataset.sub===cat) t.classList.add('active-'+cat); });
  }
  document.getElementById('summaryBar').classList.remove('open');
  activeSummaryCat = null;
  document.querySelectorAll('.stat-box').forEach(b => b.classList.remove('active'));
  render();
  setTimeout(() => openDetail(projId), 150);
}

// ── IMAGE RESIZE ──────────────────────────
function resizeImage(dataUrl, maxSize, quality) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
        else { w = Math.round(w * maxSize / h); h = maxSize; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

// ── IMAGE HANDLER ─────────────────────────
async function handleImage(input, mode) {
  const file = input.files[0];
  if (!file) return;
  const apiKey = localStorage.getItem('claudeApiKey');
  if (!apiKey) { showToast('API Key를 먼저 입력해주세요', 'error'); input.value = ''; return; }

  const reader = new FileReader();
  reader.onload = async (e) => {
    let dataUrl = e.target.result;
    document.getElementById('loadingImg').src = dataUrl;
    document.getElementById('loadingText').textContent = mode === '등기' ? 'AI가 등기부등본을 분석 중...' : 'AI가 현장 정보를 읽는 중...';
    document.getElementById('loadingOverlay').classList.add('show');

    try {
      dataUrl = await resizeImage(dataUrl, 1200, 0.75);
      const base64 = dataUrl.split(',')[1];
      const effectiveCat = getEffectiveCat();

      if (mode === '등기') {
        const data = await callClaude(base64, apiKey, getRegistryPrompt());
        const proj = {
          id: Date.now().toString(), cat: effectiveCat,
          projectName: data.name || '등기 매물', type: data.type || '빌라',
          location: data.location || '', memo: data.memo || '',
          image: dataUrl, registry: data, createdAt: new Date().toLocaleDateString('ko-KR'),
          units: [{ id:'u1', name:'전체', price:'', area: data.area||'', loan:'', status:'진행', memo:'' }]
        };
        projects.unshift(proj);
        showToast('⚡ 등기 등록 완료!', 'success');
      } else {
        const data = await callClaude(base64, apiKey, getPropertyPrompt());

        // 여러 현장 or 단일 현장 처리
        const projectList = Array.isArray(data) ? data : [data];
        let lastProjId = null;
        let totalSold = 0;

        projectList.forEach((d, pi) => {
          const units = (d.units || []).map((u, i) => ({
            id: 'u' + pi + '_' + i,
            name: u.name || ('호수'+(i+1)),
            price: u.price || '', area: u.area || '', loan: u.loan || '',
            status: u.status === '완료' ? '완료' : '진행',
            memo: u.memo || ''
          }));
          const proj = {
            id: (Date.now() + pi).toString(), cat: effectiveCat,
            projectName: d.projectName || '신규 현장', type: d.type || '빌라',
            location: d.location || '', memo: d.memo || '',
            image: dataUrl, registry: null,
            createdAt: new Date().toLocaleDateString('ko-KR'),
            units: units.length ? units : [{ id:'u1', name:'전체', price:'', area:'', loan:'', status:'진행', memo:'' }]
          };
          projects.unshift(proj);
          totalSold += units.filter(u => u.status === '완료').length;
          lastProjId = proj.id;
        });

        const msg = projectList.length > 1
          ? `⚡ ${projectList.length}개 현장 등록! (완료 ${totalSold}호 자동처리)`
          : `⚡ ${projectList[0]?.projectName} — ${projects[0]?.units.length}호 등록!${totalSold > 0 ? ` (${totalSold}개 완료)` : ''}`;
        showToast(msg, 'success');
        save(); render();
        if (lastProjId) openDetail(lastProjId);
        document.getElementById('loadingOverlay').classList.remove('show');
        input.value = '';
        return;
      }
      save(); render();
    } catch (err) {
      console.error(err);
      showToast('인식 실패: ' + (err.message || '다시 시도'), 'error');
    } finally {
      document.getElementById('loadingOverlay').classList.remove('show');
      input.value = '';
    }
  };
  reader.onerror = () => { showToast('사진을 읽을 수 없어요', 'error'); input.value = ''; };
  reader.readAsDataURL(file);
}

// ── PDF HANDLER ───────────────────────────
async function handlePdf(input) {
  const file = input.files[0];
  if (!file) return;
  const apiKey = localStorage.getItem('claudeApiKey');
  if (!apiKey) { showToast('API Key를 먼저 입력해주세요', 'error'); input.value = ''; return; }

  document.getElementById('loadingImg').src = '';
  document.getElementById('loadingText').textContent = 'AI가 PDF를 분석 중...';
  document.getElementById('loadingOverlay').classList.add('show');

  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const base64 = e.target.result.split(',')[1];
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 2000,
          messages: [{ role:'user', content: [
            { type:'document', source:{ type:'base64', media_type:'application/pdf', data:base64 } },
            { type:'text', text: getRegistryPrompt() }
          ]}]
        })
      });
      if (!res.ok) { const e2 = await res.text(); throw new Error('API ' + res.status + ': ' + e2.slice(0,60)); }
      const data = await res.json();
      const text = data.content.map(b=>b.text||'').join('');
      const obj = text.match(/\{[\s\S]*\}/);
      const parsed = JSON.parse(obj ? obj[0] : text);

      const proj = {
        id: Date.now().toString(), cat: getEffectiveCat(),
        projectName: parsed.name || '등기 매물', type: parsed.type || '빌라',
        location: parsed.location || '', memo: parsed.memo || '',
        image: null, registry: parsed, createdAt: new Date().toLocaleDateString('ko-KR'),
        units: [{ id:'u1', name:'전체', price:'', area: parsed.area||'', loan:'', status:'진행', memo:'' }]
      };
      projects.unshift(proj);
      save(); render();
      openDetail(proj.id);
      showToast('⚡ PDF 등기부 등록 완료!', 'success');
    } catch (err) {
      console.error(err);
      showToast('PDF 인식 실패: ' + (err.message||''), 'error');
    } finally {
      document.getElementById('loadingOverlay').classList.remove('show');
      input.value = '';
    }
  };
  reader.readAsDataURL(file);
}

async function callClaude(base64, apiKey, prompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type':'application/json','x-api-key':apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6', max_tokens: 4000,
      messages: [{ role:'user', content: [
        { type:'image', source:{ type:'base64', media_type:'image/jpeg', data:base64 } },
        { type:'text', text: prompt }
      ]}]
    })
  });
  if (!res.ok) { const e = await res.text(); throw new Error('API ' + res.status + ': ' + e.slice(0,60)); }
  const data = await res.json();
  const text = data.content.map(b=>b.text||'').join('');
  // 배열 먼저 시도, 실패하면 객체
  const arrMatch = text.match(/\[[\s\S]*\]/);
  const objMatch = text.match(/\{[\s\S]*\}/);
  if (arrMatch) {
    try { return JSON.parse(arrMatch[0]); } catch(e) {}
  }
  if (objMatch) {
    try { return JSON.parse(objMatch[0]); } catch(e) {}
  }
  throw new Error('JSON 파싱 실패');
}

// ── 전화번호 ─────────────────────────────
function extractPhone(text) {
  if (!text) return '';
  const m = text.match(/(0\d{1,2}[-.\s]?\d{3,4}[-.\s]?\d{4})/);
  return m ? m[1].replace(/[-.\s]/g,'') : '';
}
function linkifyPhone(text) {
  if (!text) return '-';
  return text.replace(/(0\d{1,2}[-.\s]?\d{3,4}[-.\s]?\d{4})/g, num => {
    const clean = num.replace(/[-.\s]/g, '');
    return `<a href="tel:${clean}" style="color:var(--accent2);font-weight:700;text-decoration:none;background:rgba(64,200,160,0.12);padding:2px 8px;border-radius:12px;border:1px solid rgba(64,200,160,0.3)">📞 ${num}</a>`;
  });
}

// ── 주소 파싱 (광역시 포함) ────────────────
function parseCity(addr) {
  if (!addr) return '';
  const metroFull = addr.match(/(서울특별시|서울시|부산광역시|부산시|대구광역시|대구시|인천광역시|인천시|광주광역시|광주시|대전광역시|대전시|울산광역시|울산시|세종특별자치시|세종시)/);
  if (metroFull) {
    const map = {'서울':'서울특별시','부산':'부산광역시','대구':'대구광역시','인천':'인천광역시','광주':'광주광역시','대전':'대전광역시','울산':'울산광역시','세종':'세종특별자치시'};
    const key = metroFull[1].replace(/특별시|광역시|특별자치시|시$/,'');
    return map[key] || metroFull[1];
  }
  const metroShort = addr.match(/^(서울|부산|대구|인천|광주|대전|울산|세종)\s/);
  if (metroShort) {
    const map = {'서울':'서울특별시','부산':'부산광역시','대구':'대구광역시','인천':'인천광역시','광주':'광주광역시','대전':'대전광역시','울산':'울산광역시','세종':'세종특별자치시'};
    return map[metroShort[1]];
  }
  const m = addr.match(/([가-힣]+시|[가-힣]+군)/);
  return m ? m[1] : '';
}
function parseDong(addr) {
  if (!addr) return '';
  const city = parseCity(addr);
  if (city && /광역시|특별시|특별자치시/.test(city)) {
    const gu = addr.match(/([가-힣]+구)/);
    if (gu) return gu[1];
  }
  const m = addr.match(/([가-힣]+읍|[가-힣]+면|[가-힣]+동|[가-힣]+리)/);
  return m ? m[1] : '';
}

// ── 지역 필터 ──────────────────────────────
function updateRegionFilter() {
  const effectiveCat = getEffectiveCat();
  const all = projects.filter(p => p.cat === effectiveCat);
  const cities = ['all', ...new Set(all.map(p => parseCity(p.location)).filter(Boolean))].sort((a,b)=>a==='all'?-1:b==='all'?1:a.localeCompare(b,'ko'));
  document.getElementById('regionCityRow').innerHTML = cities.map(c =>
    `<button class="region-chip ${c===currentCity?(c==='all'?'active':'city-active'):''}" onclick="setCity('${c}')">${c==='all'?'전체':c}</button>`
  ).join('');

  const dongRow = document.getElementById('regionDongRow');
  if (currentCity === 'all') { dongRow.style.display='none'; return; }
  const cityProjs = all.filter(p => parseCity(p.location) === currentCity);
  const dongs = ['all', ...new Set(cityProjs.map(p => parseDong(p.location)).filter(Boolean))].sort((a,b)=>a==='all'?-1:b==='all'?1:a.localeCompare(b,'ko'));
  if (dongs.length > 2) {
    dongRow.innerHTML = dongs.map(d =>
      `<button class="region-chip ${d===currentDong?(d==='all'?'active':'dong-active'):''}" onclick="setDong('${d}')">${d==='all'?'전체':d}</button>`
    ).join('');
    dongRow.style.display = 'flex';
  } else dongRow.style.display = 'none';
}
function setCity(city) { currentCity = city; currentDong = 'all'; updateRegionFilter(); render(); }
function setDong(dong) { currentDong = dong; updateRegionFilter(); render(); }

function setStatus(s, el) {
  currentStatus = s;
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ── RENDER ────────────────────────────────
function render() {
  document.getElementById('cnt분양').textContent = projects.filter(p=>p.cat==='분양').length;
  document.getElementById('cnt중개').textContent = projects.filter(p=>['매매','전세','월세'].includes(p.cat)).length;
  document.getElementById('cnt매매').textContent = projects.filter(p=>p.cat==='매매').length;
  document.getElementById('cnt전세').textContent = projects.filter(p=>p.cat==='전세').length;
  document.getElementById('cnt월세').textContent = projects.filter(p=>p.cat==='월세').length;

  updateRegionFilter();

  const effectiveCat = getEffectiveCat();
  const list = document.getElementById('projectList');
  let filtered = projects.filter(p => p.cat === effectiveCat);
  if (currentCity !== 'all') filtered = filtered.filter(p => parseCity(p.location) === currentCity);
  if (currentDong !== 'all') filtered = filtered.filter(p => parseDong(p.location) === currentDong);
  if (currentStatus === '진행') filtered = filtered.filter(p => p.units.some(u=>u.status==='진행'));
  if (currentStatus === '완료') filtered = filtered.filter(p => p.units.every(u=>u.status==='완료'));

  if (!filtered.length) {
    const region = currentCity !== 'all' ? ` (${currentCity}${currentDong!=='all'?' '+currentDong:''})` : '';
    list.innerHTML = `<div class="empty">📋 ${effectiveCat}${region} 현장이 없습니다<br><span style="font-size:11px;color:var(--text3)">사진을 찍으면 바로 등록돼요!</span></div>`;
    return;
  }

  const colMap = { 분양:'var(--accent)', 매매:'var(--info)', 전세:'var(--accent2)', 월세:'var(--purple)' };
  const bgMap = { 분양:'rgba(232,200,64,0.15)', 매매:'rgba(80,136,232,0.15)', 전세:'rgba(64,200,160,0.15)', 월세:'rgba(160,120,232,0.15)' };

  list.innerHTML = filtered.map(proj => {
    const remain = proj.units.filter(u=>u.status==='진행').length;
    const done = proj.units.filter(u=>u.status==='완료').length;

          <div class="proj-card-name">${proj.projectName}</div>

          ${phone ? `<div style="margin-top:5px;font-size:12px"><a href="tel:${phone}" onclick="event.stopPropagation()" style="color:var(--accent2);text-decoration:none;font-weight:700">📞 ${phone}</a></div>` : ''}
        </div>
        <div class="proj-card-arrow">›</div>
      </div>
      <div class="proj-card-meta">
        <span class="proj-card-badge" style="background:${bgMap[c]};color:${colMap[c]}">${remain}진행</span>
        ${done ? `<span class="proj-card-badge" style="background:rgba(232,80,80,0.15);color:var(--danger)">${done}완료</span>` : ''}
        <span class="proj-card-date">${proj.createdAt}</span>

    regHTML = `

      </div>
      <div class="detail-info-row">
        <div class="detail-info-label">메모</div>
        <div class="detail-info-value" style="font-size:12px;color:var(--text2);line-height:1.7">${linkifyPhone(proj.memo)}</div>
        <button class="detail-info-edit" onclick="editField('${proj.id}','memo')">수정</button>
      </div>
    </div>
    ${(proj.image || proj.registry) ? `
    <div class="detail-photo-btns">
      ${proj.image ? `<button class="detail-photo-btn" onclick="openPhoto('${proj.id}')">🖼️ 분양 속지 보기</button>` : ''}
      ${proj.registry ? `<button class="detail-photo-btn" onclick="openPhoto('${proj.id}')">📋 등기부등본 보기</button>` : ''}
    </div>` : ''}
    <div class="detail-section-title">🏠 타입별 호수 현황</div>
    ${typesHTML || '<div style="color:var(--text3);font-size:13px;padding:10px 0">등록된 호수가 없습니다</div>'}
    ${regHTML}
    <div style="font-size:11px;color:var(--text3);margin-top:16px;text-align:right">📅 등록일 ${proj.createdAt}</div>
  `;

  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail() { document.getElementById('detailOverlay').classList.remove('open'); detailProjId = null; }

function openMapFromDetail() {
  const proj = projects.find(p=>p.id===detailProjId);
  if (!proj) return;
  const encoded = encodeURIComponent(proj.location || proj.projectName);
  const tmapUrl = `tmap://search?name=${encoded}`;
  const kakaoUrl = `https://map.kakao.com/link/search/${encoded}`;
  window.location.href = tmapUrl;
  setTimeout(() => window.open(kakaoUrl, '_blank'), 1500);
}

function deleteFromDetail() {
  const proj = projects.find(p=>p.id===detailProjId);
  if (!confirm(`"${proj?.projectName}" 현장 전체 삭제할까요?`)) return;
  projects = projects.filter(p=>p.id!==detailProjId);
  save(); render(); closeDetail();
  showToast('삭제됨', 'success');
}

function editField(projId, field) {
  const proj = projects.find(p=>p.id===projId);
  if (!proj) return;
  const labels = { name:'현장명', location:'주소', memo:'메모' };
  const cur = field==='name' ? proj.projectName : (field==='location' ? proj.location : proj.memo);
  const val = prompt(labels[field] + ' 수정:', cur || '');
  if (val === null) return;
  if (field==='name') proj.projectName = val.trim();
  else if (field==='location') proj.location = val.trim();
  else proj.memo = val.trim();
  save(); render();
  openDetail(projId);
  showToast(labels[field] + ' 수정됨 ✓', 'success');
}

// ── UNIT POPUP ────────────────────────────
function openUnitPopup(projId, unitId) {
  const proj = projects.find(p=>p.id===projId);
  const u = proj?.units.find(u=>u.id===unitId);
  if (!proj||!u) return;
  pendingUnitProjId = projId; pendingUnitId = unitId;

  document.getElementById('unitPopupName').textContent = proj.projectName + ' ' + u.name;
  document.getElementById('unitPopupSub').textContent = [u.area, u.price, u.memo].filter(Boolean).join(' · ') || '정보 없음';

  const btns = document.getElementById('unitPopupBtns');
  if (u.status === '진행') {
    btns.innerHTML = `
      <button class="unit-popup-btn complete" onclick="setUnitStatus('완료')">✅ 분양완료 처리</button>
      <button class="unit-popup-btn edit" onclick="editUnitInline()">✏️ 정보 수정 (가격/면적 등)</button>
      <button class="unit-popup-btn cancel" onclick="closeUnitPopup()">취소</button>`;
  } else {
    btns.innerHTML = `
      <button class="unit-popup-btn reopen" onclick="setUnitStatus('진행')">🔄 진행중으로 되돌리기</button>
      <button class="unit-popup-btn edit" onclick="editUnitInline()">✏️ 정보 수정</button>
      <button class="unit-popup-btn cancel" onclick="closeUnitPopup()">취소</button>`;
  }
  document.getElementById('unitPopup').classList.add('open');
}

function editUnitInline() {
  const proj = projects.find(p=>p.id===pendingUnitProjId);
  const u = proj?.units.find(u=>u.id===pendingUnitId);
  if (!u) return;

  const newName = prompt('호수명:', u.name);
  if (newName === null) return;
  const newPrice = prompt('가격:', u.price || '');
  if (newPrice === null) return;
  const newArea = prompt('면적:', u.area || '');
  if (newArea === null) return;
  const newMemo = prompt('메모:', u.memo || '');
  if (newMemo === null) return;

  u.name = newName.trim() || u.name;
  u.price = newPrice.trim();
  u.area = newArea.trim();
  u.memo = newMemo.trim();
  save(); render();
  closeUnitPopup();
  openDetail(pendingUnitProjId);
  showToast('호수 정보 수정됨 ✓', 'success');
}

function setUnitStatus(status) {
  const proj = projects.find(p=>p.id===pendingUnitProjId);
  const u = proj?.units.find(u=>u.id===pendingUnitId);
  if (!u) return;
  if (status === '완료' && !confirm(`"${u.name}" 분양완료 처리할까요?`)) { closeUnitPopup(); return; }
  u.status = status;
  save(); render();
  closeUnitPopup();
  openDetail(pendingUnitProjId);
  showToast(status==='완료' ? '✅ 완료 처리됨' : '🔄 진행중으로 변경', 'success');
}

function closeUnitPopup(e) {
  if (e && e.target !== document.getElementById('unitPopup')) return;
  document.getElementById('unitPopup').classList.remove('open');
}

// ── PHOTO (확대 가능) ─────────────────────
function openPhoto(projId) {
  const proj = projects.find(p=>p.id===projId);
  if (!proj?.image) return;
  document.getElementById('photoTitle').textContent = proj.projectName;
  document.getElementById('photoImg').src = proj.image;
  document.getElementById('photoImg').classList.remove('zoomed');
  document.getElementById('photoOverlay').classList.add('open');
}
function closePhoto() {
  document.getElementById('photoOverlay').classList.remove('open');
  document.getElementById('photoImg').classList.remove('zoomed');
}
function toggleZoom(e) {
  e.stopPropagation();
  document.getElementById('photoImg').classList.toggle('zoomed');
}

// ── MANUAL FORM ──────────────────────────
function toggleRegFields() {
  const cat = document.getElementById('m_cat').value;
  document.getElementById('regFields').style.display = cat!=='분양' ? '' : 'none';
}
function addUnitRow(name='',price='',area='',loan='',memo='') {
  const c = document.getElementById('unitRows');
  const d = document.createElement('div');
  d.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;background:var(--surface2);padding:10px;border-radius:8px;position:relative;';
  d.innerHTML=`
    <input class="form-input u-name" placeholder="호수 (예: 601동 101호)" value="${name}" style="grid-column:span 2">
    <input class="form-input u-price" placeholder="가격" value="${price}">
    <input class="form-input u-area" placeholder="면적" value="${area}">
    <input class="form-input u-loan" placeholder="대출" value="${loan}">
    <input class="form-input u-memo" placeholder="특이사항" value="${memo}">
    <button type="button" onclick="this.parentNode.remove()" style="position:absolute;top:6px;right:6px;background:transparent;border:none;color:var(--text3);font-size:14px;cursor:pointer;">✕</button>`;
  c.appendChild(d);
}
function openManual() {
  editingProjId = null;
  ['m_name','m_location','m_memo','m_owner','m_regAddr','m_buildArea','m_landArea','m_structure','m_approvalDate','m_mortgageAmt','m_rights'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('m_cat').value = getEffectiveCat();
  document.getElementById('m_type').value = '빌라';
  document.getElementById('unitRows').innerHTML = '';
  addUnitRow();
  document.getElementById('modalTitle').innerHTML = '✏️ <span>현장 등록</span>';
  toggleRegFields();
  document.getElementById('manualOverlay').classList.add('open');
}
function closeManual() { document.getElementById('manualOverlay').classList.remove('open'); }
function closeManualOutside(e) { if(e.target===document.getElementById('manualOverlay')) closeManual(); }

function saveManual() {
  const name = document.getElementById('m_name').value.trim();
  if (!name) { showToast('현장명을 입력해주세요','error'); return; }
  const cat = document.getElementById('m_cat').value;

  const unitEls = document.getElementById('unitRows').querySelectorAll('div');
  const units = [...unitEls].map((el,i)=>({
    id:'u'+(Date.now()+i),
    name: el.querySelector('.u-name')?.value||'',
    price: el.querySelector('.u-price')?.value||'',
    area: el.querySelector('.u-area')?.value||'',
    loan: el.querySelector('.u-loan')?.value||'',
    memo: el.querySelector('.u-memo')?.value||'',
    status:'진행'
  })).filter(u=>u.name);

  const hasReg = cat!=='분양';
  const regData = hasReg ? {
    owner:document.getElementById('m_owner').value,
    regAddr:document.getElementById('m_regAddr').value,
    buildArea:document.getElementById('m_buildArea').value,
    landArea:document.getElementById('m_landArea').value,
    structure:document.getElementById('m_structure').value,
    approvalDate:document.getElementById('m_approvalDate').value,
    mortgage:document.getElementById('m_mortgage')?.value||'없음',
    mortgageAmt:document.getElementById('m_mortgageAmt').value,
    rights:document.getElementById('m_rights').value,
  } : null;
  const hasRegData = regData && Object.values(regData).some(v=>v);

  const proj = {
    id:Date.now().toString(), cat, projectName:name,
    type:document.getElementById('m_type').value,
    location:document.getElementById('m_location').value,
    memo:document.getElementById('m_memo').value,
    image:null, registry:hasRegData?regData:null,
    createdAt:new Date().toLocaleDateString('ko-KR'),
    units:units.length?units:[{id:'u1',name:'전체',price:'',area:'',loan:'',status:'진행',memo:''}]
  };
  projects.unshift(proj);
  showToast('현장 등록 완료 ✓','success');

  currentCat = cat==='분양'?'분양':'중개';
  if(cat!=='분양'){currentSub=cat;}
  save(); render(); closeManual();
}

// ── 내보내기/가져오기 ──────────────────────
function exportData() {
  const data = { version:'v7', exportedAt: new Date().toLocaleString('ko-KR'), projects };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `매물데이터_${new Date().toLocaleDateString('ko-KR').replace(/[\. ]/g,'')}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('📤 내보내기 완료!', 'success');
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      const imported = data.projects || data;
      if (!Array.isArray(imported)) throw new Error('형식 오류');
      const existingIds = new Set(projects.map(p => p.id));
      const newProjects = imported.filter(p => !existingIds.has(p.id));
      if (!confirm(`가져올 현장: ${imported.length}개\n새로 추가: ${newProjects.length}개\n기존 유지: ${projects.length}개\n\n가져오시겠어요?`)) return;
      projects = [...newProjects, ...projects];
      save(); render();
      showToast(`📥 ${newProjects.length}개 현장 가져오기 완료!`, 'success');
    } catch (err) {
      showToast('파일 형식 오류', 'error');
    }
    input.value = '';
  };
  reader.readAsText(file);
}

function save() { localStorage.setItem('매물_v7', JSON.stringify(projects)); }

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ── TAB SWITCH ────────────────────────────
function switchTab(tab) {
  const main = document.getElementById('mainView');
  const mapV = document.getElementById('mapView');
  if (tab === 'map') {
    main.classList.add('hidden');
    mapV.classList.add('show');
    document.getElementById('navList').classList.remove('active');
    document.getElementById('navMap').classList.add('active');
    initMap();
  } else {
    mapV.classList.remove('show');
    main.classList.remove('hidden');
    document.getElementById('navList').classList.add('active');
    document.getElementById('navMap').classList.remove('active');
  }
}

// ── KAKAO MAP ────────────────────────────
function initMap() {
  const key = localStorage.getItem('kakaoKey');
  if (!key) {
    document.getElementById('kakaoMap').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:10px;color:#5a5a72;font-size:13px;padding:20px;text-align:center">🗺️ 카카오맵 Key를 입력해야 지도가 표시돼요<br><span style="font-size:11px">설정(⚙️) → 카카오맵 Key 입력</span></div>';
    return;
  }
  if (window.kakao && window.kakao.maps && window.kakao.maps.services) {
    renderMap(); return;
  }
  const existing = document.getElementById('kakaoMapSdk');
  if (existing) {
    const wait = setInterval(() => {
      if (window.kakao && window.kakao.maps && window.kakao.maps.services) {
        clearInterval(wait);
        window.kakao.maps.load(renderMap);
      }
    }, 200);
    return;
  }
  const s = document.createElement('script');
  s.id = 'kakaoMapSdk';
  s.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${key}&libraries=services&autoload=false`;
  s.onload = () => window.kakao.maps.load(renderMap);
  s.onerror = () => {
    document.getElementById('kakaoMap').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#e85050;font-size:13px;padding:20px;text-align:center">❌ 카카오맵 Key 오류 또는 도메인 미등록</div>';
  };
  document.head.appendChild(s);
}

function setMapCat(cat, el) {
  mapCat = cat;
  document.querySelectorAll('.map-cat-btn').forEach(b => b.className = 'map-cat-btn');
  el.classList.add('active-' + cat);
  const labels = { all:'전체', 분양:'분양', 매매:'매매', 전세:'전세', 월세:'월세' };
  document.getElementById('mapTitle').textContent = labels[cat];
  renderMap();
}

const catColor = { 분양:'#e8c840', 매매:'#5088e8', 전세:'#40c8a0', 월세:'#a078e8' };

function renderMap() {
  const container = document.getElementById('kakaoMap');
  if (!container) return;
  const center = new window.kakao.maps.LatLng(37.5665, 126.9780); // 서울 기본
  kakaoMap = new window.kakao.maps.Map(container, { center, level: 8 });
  mapMarkers.forEach(m => m.setMap(null));
  mapMarkers = [];

  const filtered = mapCat === 'all' ? projects : projects.filter(p => p.cat === mapCat);
  if (!filtered.length) {
    container.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#5a5a72;font-size:14px">${mapCat==='all'?'등록된':mapCat} 현장이 없습니다</div>`;
    return;
  }

  const geocoder = new window.kakao.maps.services.Geocoder();
  const bounds = new window.kakao.maps.LatLngBounds();
  let placed = 0;

  filtered.forEach(proj => {
    if (!proj.location) return;
    geocoder.addressSearch(proj.location, (result, status) => {
      if (status !== window.kakao.maps.services.Status.OK) {
        // 주소 실패시 현장명으로 재시도
        geocoder.addressSearch(proj.projectName, (r2, s2) => {
          if (s2 === window.kakao.maps.services.Status.OK) placeMarker(proj, r2[0]);
        });
        return;
      }
      placeMarker(proj, result[0]);
    });

    function placeMarker(p, res) {
      const coords = new window.kakao.maps.LatLng(res.y, res.x);
      bounds.extend(coords);
      placed++;
      const color = catColor[p.cat] || '#e8c840';
      const remain = p.units.filter(u=>u.status==='진행').length;
      const content = `
        <div onclick="showMapPopup('${p.id}')" style="
          background:${color};color:#0f0f13;padding:5px 10px;
          border-radius:20px;font-size:12px;font-weight:800;
          box-shadow:0 2px 8px rgba(0,0,0,0.4);white-space:nowrap;
          cursor:pointer;border:2px solid rgba(255,255,255,0.3);position:relative;">
          ${p.projectName} <span style="opacity:0.7">${remain}건</span>
          <div style="position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);
            width:0;height:0;border-left:6px solid transparent;
            border-right:6px solid transparent;border-top:7px solid ${color}"></div>
        </div>`;
      const marker = new window.kakao.maps.CustomOverlay({
        map: kakaoMap, position: coords, content, yAnchor: 1.3
      });
      mapMarkers.push(marker);
      if (placed > 1) kakaoMap.setBounds(bounds);
      else kakaoMap.setCenter(coords);
    }
  });
}

function showMapPopup(projId) {
  const proj = projects.find(p=>p.id===projId);
  if (!proj) return;
  mapPopupProjId = projId;
  const remain = proj.units.filter(u=>u.status==='진행').length;
  const done = proj.units.filter(u=>u.status==='완료').length;
  document.getElementById('mapPopupName').textContent = proj.projectName + ` (${proj.cat})`;
  document.getElementById('mapPopupAddr').textContent = `📍 ${proj.location||'-'} · 진행 ${remain}건 완료 ${done}건`;
  const encoded = encodeURIComponent(proj.location || proj.projectName);
  document.getElementById('mapPopupTmap').href = `tmap://search?name=${encoded}`;
  document.getElementById('mapPopup').classList.add('show');
}
function closeMapPopup() { document.getElementById('mapPopup').classList.remove('show'); mapPopupProjId = null; }
function mapPopupGoDetail() {
  if (!mapPopupProjId) return;
  const id = mapPopupProjId;
  closeMapPopup();
  switchTab('list');
  setTimeout(() => openDetail(id), 200);
}

// ── INIT ──────────────────────────────────
updateApiStatus();
const _kk = localStorage.getItem('kakaoKey');
if (_kk) {
  document.getElementById('kakaoStatus').textContent = '✓ 카카오맵 Key 등록됨';
  document.getElementById('kakaoStatus').className = 'api-status ok';
  document.getElementById('kakaoKeyInput').value = _kk.slice(0,8) + '...';
}
render();

// SW
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
